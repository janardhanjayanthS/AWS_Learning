trigger:
- main

variables:
  imageName: fastapi-helloworld
  acrLoginServer: <YOUR_ACR_NAME>.azurecr.io
  appServiceName: <YOUR_WEBAPP_NAME>
  resourceGroup: <YOUR_RESOURCE_GROUP>

stages:
- stage: BuildAndPush
  displayName: Build and push Docker image
  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self
    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: '<YOUR_SERVICE_CONNECTION>'
    - task: Docker@2
      displayName: Build image
      inputs:
        command: build
        dockerfile: Dockerfile
        containerRegistry: '<YOUR_SERVICE_CONNECTION>'
        repository: '$(acrLoginServer)/$(imageName)'
        tags: |
          latest
    - task: Docker@2
      displayName: Push image
      inputs:
        command: push
        containerRegistry: '<YOUR_SERVICE_CONNECTION>'
        repository: '$(acrLoginServer)/$(imageName)'
        tags: |
          latest

- stage: Deploy
  displayName: Deploy to Azure App Service
  dependsOn: BuildAndPush
  jobs:
  - deployment: DeployWeb
    environment: 'production'
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy container web app
            inputs:
              azureSubscription: '<YOUR_SERVICE_CONNECTION>'
              appName: '$(appServiceName)'
              imageName: '$(acrLoginServer)/$(imageName):latest'
